<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZZJ专属私人定制旅行AI助手</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <header>
            <div class="logo">✈️ AI Travel</div>
            <h1>ZZJ专属私人定制旅行AI助手</h1>
            <p class="api-key-status" id="apiKeyStatus" style="font-size:12px;color:var(--text-muted);margin-top:8px;cursor:pointer" onclick="showApiKeyPrompt()" title="服务器已内置AI，你也可以用自己的Key">🔑 <span id="apiKeyLabel">AI 由服务器提供（无需配置）</span></p>
        </header>

        <section class="input-section">
            <form id="travelForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>🏠 出发地点</label>
                        <input type="text" id="origin" placeholder="例如：杭州、上海、北京" required>
                    </div>
                    
                    <div class="form-group">
                        <label>🎯 目的地</label>
                        <input type="text" id="destination" placeholder="例如：大理、丽江、杭州" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>📅 出发日期</label>
                        <input type="date" id="startDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label>📅 天数</label>
                        <select id="days">
                            <option value="2">2天</option>
                            <option value="3">3天</option>
                            <option value="4" selected>4天</option>
                            <option value="5">5天</option>
                            <option value="6">6天</option>
                            <option value="7">7天</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>💰 人均预算（元）</label>
                        <input type="number" id="budget" placeholder="例如：2000" value="2000" required>
                    </div>
                    
                    <div class="form-group">
                        <label>🚄 出行方式</label>
                        <select id="transport">
                            <option value="高铁">高铁</option>
                            <option value="飞机">飞机</option>
                            <option value="自驾">自驾</option>
                            <option value="都可以">都可以</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>⚡ 节奏偏好</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="pace" value="特种兵">
                            <span>特种兵（多打卡）</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="pace" value="放松" checked>
                            <span>放松度假（睡到自然醒）</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="pace" value="综合">
                            <span>综合混搭</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>✨ 特殊偏好（选填）</label>
                    <textarea id="preferences" placeholder="例如：喜欢拍照、不爱排队、想吃当地美食、想看日出"></textarea>
                </div>

                <button type="submit" class="btn-generate" id="generateBtn">
                    🚀 生成专属行程方案
                </button>
            </form>
        </section>

        <section class="result-section" id="result">
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p class="loading-text">AI正在为你生成专属行程...</p>
                <p class="loading-hint">通常需要15-30秒，请耐心等待</p>
            </div>
            
            <div class="result-content" id="resultContent" style="display: none;">
                <div class="result-header">
                    <h2>📋 行程方案</h2>
                    <div style="display:flex;gap:10px;">
                        <button class="btn-copy" onclick="copyResult()">📋 复制</button>
                        <button class="btn-share" onclick="shareTrip()">📤 分享</button>
                        <button class="btn-pdf" onclick="exportPDF()">🖨️ 导出PDF</button>
                        <button class="btn-edit" id="btnEdit" onclick="toggleEdit()">✏️ 编辑</button>
                    </div>
                </div>
                <div class="result-body" id="resultBody"></div>
                <div class="budget-chart" id="budgetChart" style="display:none;">
                    <h3>💰 预算分配</h3>
                    <canvas id="budgetCanvas" width="300" height="300"></canvas>
                    <div id="budgetLegend" class="budget-legend"></div>
                </div>
                <div class="weather-box" id="weatherBox" style="display:none;"></div>
                <div class="map-box" id="mapBox" style="display:none;">
                    <h3>🗺️ 行程地图</h3>
                    <div id="tripMap" style="height:400px;border-radius:8px;"></div>
                </div>
                <div class="ai-disclaimer" style="margin-top:16px;padding:12px 16px;background:rgba(255,193,7,0.1);border-left:3px solid #ffc107;border-radius:6px;font-size:12px;color:#856404;line-height:1.6;">
                    ⚠️ <strong>AI 生成内容仅供参考</strong>：行程、餐饮、交通、住宿等信息由大模型生成。车次/航班时刻、门票价格、营业时间、酒店价格等请<strong>出行前通过官方渠道二次确认</strong>。
                </div>
            </div>
        </section>

        <section class="panel-section" id="historyPanel" style="display:none;">
            <div class="panel-tabs">
                <button class="panel-tab active" onclick="switchPanel('history')">📋 历史行程</button>
                <button class="panel-tab" onclick="switchPanel('countdown')">⏰ 倒数日</button>
            </div>
            <div class="panel-content" id="panelContent"></div>
        </section>

        <footer>
            <p>Powered by AI · 私人定制 · 为你俩的旅行</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
    // 粒子背景动画
    (() => {
        const canvas = document.getElementById('particles')
        const ctx = canvas.getContext('2d')
        let particles = []
        const max = 60

        function resize() {
            canvas.width = window.innerWidth
            canvas.height = window.innerHeight
        }
        resize()
        window.addEventListener('resize', resize)

        class Particle {
            constructor() {
                this.reset()
                this.y = Math.random() * canvas.height
            }
            reset() {
                this.x = Math.random() * canvas.width
                this.y = -10
                this.size = Math.random() * 2 + 0.5
                this.speed = Math.random() * 0.5 + 0.2
                this.opacity = Math.random() * 0.5 + 0.2
            }
            update() {
                this.y += this.speed
                this.x += Math.sin(this.y * 0.01) * 0.3
                if (this.y > canvas.height + 10) this.reset()
            }
            draw() {
                ctx.beginPath()
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2)
                ctx.fillStyle = `rgba(255, 107, 53, ${this.opacity})`
                ctx.fill()
            }
        }

        for (let i = 0; i < max; i++) particles.push(new Particle())

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height)
            particles.forEach(p => { p.update(); p.draw() })
            // 连线
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x
                    const dy = particles[i].y - particles[j].y
                    const dist = Math.sqrt(dx * dx + dy * dy)
                    if (dist < 120) {
                        ctx.beginPath()
                        ctx.moveTo(particles[i].x, particles[i].y)
                        ctx.lineTo(particles[j].x, particles[j].y)
                        ctx.strokeStyle = `rgba(255, 107, 53, ${0.08 * (1 - dist / 120)})`
                        ctx.lineWidth = 0.5
                        ctx.stroke()
                    }
                }
            }
            requestAnimationFrame(animate)
        }
        animate()
    })()
    </script>
</body>
</html>
